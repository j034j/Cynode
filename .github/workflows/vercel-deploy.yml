name: Vercel Deploy

on:
  push:
    branches:
      - main
      - fix/sync-auth-pwa

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify Turso migration secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          if [ -z "$TURSO_DATABASE_URL" ] || [ -z "$TURSO_AUTH_TOKEN" ]; then
            echo "Missing TURSO_DATABASE_URL or TURSO_AUTH_TOKEN GitHub Actions secrets."
            exit 1
          fi

      - name: Apply Turso migrations
        run: npm run db:migrate:turso
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Deploy to Vercel (Preview on branches, Production on main)
        uses: vercel/action@v2
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          # Use --prod only for main branch
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod --confirm' || '--confirm' }}

    # Allow job to read repository secrets for Vercel
    permissions:
      contents: read
      id-token: write
